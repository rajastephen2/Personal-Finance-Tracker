<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Tracker</title>
<link rel="stylesheet" href="/static/style.css">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }

    .navbar {
        background: #2c3e50;
        padding: 12px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .navbar a {
        color: white;
        margin-right: 20px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .navbar a:hover {
        color: #f39c12;
    }

    .navbar button {
        background: #e74c3c;
        border: none;
        padding: 8px 15px;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .navbar button:hover {
        background: #c0392b;
    }

    .container {
        width: 80%;
        margin: auto;
        padding: 20px;
    }

    h1 {
        margin-top: 20px;
        text-align: center;
        color: #2c3e50;
    }

    .cards {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        width: 30%;
        text-align: center;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
        background: #ecf0f1;
    }

    .card h3 {
        color: #34495e;
    }

    .card p {
        font-size: 20px;
        font-weight: bold;
        color: #27ae60;
    }

    .form-box {
        background: white;
        padding: 20px;
        margin-top: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    .form-box h2 {
        color: #2c3e50;
        margin-bottom: 15px;
    }

    select, input, button {
        padding: 10px;
        margin: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #3498db;
        box-shadow: 0 0 6px rgba(52,152,219,0.5);
        outline: none;
    }

    button {
        background: #3498db;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #2980b9;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="navbar">
    <div>
        <a href="/">Home</a>
        <a href="/transactions_page">Transactions</a>
        <a href="/report">Monthly Report</a>
        <a href="/download_pdf">Download PDF</a>
    </div>
    <div>
        <span>👤 {{ user }}</span>
        <a href="/logout" style="margin-left:10px;">
            <button>Logout</button>
        </a>
    </div>
</div>

<div class="container">
    <h1>💰 Finance Tracker Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Income</h3>
            <p id="income">₹0</p>
        </div>
        <div class="card">
            <h3>Outcome</h3>
            <p id="expense">₹0</p>
        </div>
        <div class="card">
            <h3>Balance</h3>
            <p id="balance">₹0</p>
        </div>
    </div>

    <div class="form-box">
        <h2>Add Transaction</h2>
        <select id="type">
            <option value="income">Income</option>
            <option value="outcome">Outcome</option>
        </select>
        <select id="category">
            <option>Salary</option>
            <option>Rent</option>
            <option>Shopping</option>
            <option>Food</option>
            <option>Travel</option>
        </select>
        <input type="number" id="amount" placeholder="Enter amount">
        <button onclick="addTransaction()">Add</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
