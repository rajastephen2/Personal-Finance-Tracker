<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4ff, #e0eaff);
        margin: 0;
        padding: 20px;
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }
    h3 {
        color: #34495e;
        margin-top: 30px;
    }
    ul {
        list-style: none;
        padding: 0;
    }
    ul li {
        background: #3498db;
        color: white;
        margin: 5px 0;
        padding: 10px;
        border-radius: 5px;
        transition: 0.3s;
    }
    ul li:hover {
        background: #2980b9;
        transform: scale(1.05);
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    th, td {
        padding: 12px;
        text-align: center;
    }
    th {
        background: #2ecc71;
        color: white;
    }
    tr:nth-child(even) {
        background: #f9f9f9;
    }
    tr:hover {
        background: #d1f2eb;
        transition: 0.3s;
    }
    td {
        color: #2c3e50;
    }
</style>
</head>
<body>

<h2>👨‍💼 Admin Dashboard</h2>

<h3>Users</h3>
<ul>
{% for u in users %}
<li>{{ u.username }}</li>
{% endfor %}
</ul>

<h3>Transactions</h3>
<table>
<tr>
<th>User</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
</tr>
{% for t in transactions %}
<tr>
<td>{{ t.username }}</td>
<td>{{ t.type }}</td>
<td>{{ t.category }}</td>
<td>{{ t.amount }}</td>
<td>{{ t.date }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
