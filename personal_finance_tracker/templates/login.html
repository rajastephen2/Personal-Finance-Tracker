<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #9face6);
        margin: 0;
        padding: 0;
    }

    .login-box {
        width: 400px;
        margin: 100px auto;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    h1 {
        margin-bottom: 10px;
        color: #2c3e50;
    }

    h2 {
        margin-bottom: 20px;
        color: #34495e;
    }

    input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #3498db;
        outline: none;
        box-shadow: 0 0 8px rgba(52,152,219,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #2980b9;
        transform: scale(1.05);
    }

    p {
        margin-top: 15px;
    }

    a {
        color: #3498db;
        text-decoration: none;
        transition: 0.3s;
    }

    a:hover {
        color: #2980b9;
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(-20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="login-box">
    <h1>💰 Personal Finance Tracker</h1>
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
        <p><a href="/forgot">Forgot Password?</a></p>
        <p>New user? <a href="/register">Register Here</a></p>
    </form>
</div>

</body>
</html>
